entryPoints:
  web:
    address: ":80" 

api:
  insecure: true

providers:
  consulCatalog:
    exposedByDefault: false
    endpoint:
      address: "consul:8500"
    watch: true
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

log:
  level: DEBUG

accessLog:
  filePath: "./logs/access.log"